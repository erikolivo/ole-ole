name: Selección semanal de favoritos

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

jobs:
  seleccion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar selección semanal (Fase 1)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_TECNICO: ${{ secrets.TELEGRAM_CHAT_ID_TECNICO }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python selection.py
      - name: Guardar datos generados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Selección semanal automática"
          file_pattern: "data/*.json data/*.csv"

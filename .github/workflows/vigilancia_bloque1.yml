name: Vigilancia en vivo — Bloque 1

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  vigilancia:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Loop interno de vigilancia (Fase 3 y 4)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_TECNICO: ${{ secrets.TELEGRAM_CHAT_ID_TECNICO }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -c "import live_monitor; live_monitor.correr_bloque(max_horas=5.5)"
      - name: Guardar estado persistido
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Estado vivo — fin de bloque 1"
          file_pattern: "data/estado_vivo_*.json data/contador_requests_*.json"
